name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Maps API key
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          if [ -z "$MAPS_API_KEY" ]; then
            echo "::error::MAPS_API_KEY secret is not set"; exit 1
          fi
          # index.html is the Pages entry point, built from the source map page
          cp sklypas-google.html index.html
          # replace the placeholder with the secret (no plain-text key in repo)
          python3 - "$MAPS_API_KEY" <<'PY'
          import sys, pathlib
          key = sys.argv[1]
          p = pathlib.Path("index.html")
          p.write_text(p.read_text(encoding="utf-8").replace("__MAPS_API_KEY__", key), encoding="utf-8")
          print("Injected key into index.html")
          PY

      - uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
